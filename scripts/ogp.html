<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 1200px;
        height: 630px;
        font-family: "Hiragino Maru Gothic ProN", "Hiragino Sans", "Noto Sans JP", -apple-system, sans-serif;
        background:
          repeating-linear-gradient(
            45deg,
            transparent 0,
            transparent 40px,
            rgba(255, 61, 127, 0.08) 40px,
            rgba(255, 61, 127, 0.08) 80px
          ),
          radial-gradient(circle at 15% 15%, rgba(255, 61, 127, 0.25), transparent 50%),
          radial-gradient(circle at 85% 85%, rgba(255, 220, 0, 0.35), transparent 55%),
          #fff5d6;
        color: #1a1a1a;
        overflow: hidden;
      }
      .container {
        width: 100%;
        height: 100%;
        padding: 70px 80px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
      }
      /* concentration lines burst */
      .burst {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 1400px;
        height: 1400px;
        transform: translate(-50%, -50%);
        background: repeating-conic-gradient(
          from 0deg,
          rgba(255, 220, 0, 0) 0deg,
          rgba(255, 220, 0, 0) 8deg,
          rgba(255, 220, 0, 0.18) 8deg,
          rgba(255, 220, 0, 0.18) 11deg
        );
        border-radius: 50%;
        z-index: 0;
      }
      .header {
        position: relative;
        z-index: 1;
        text-align: center;
      }
      .badge-bubble {
        display: inline-block;
        background: #fff;
        color: #1a1a1a;
        border: 4px solid #1a1a1a;
        padding: 12px 32px;
        border-radius: 999px;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 0.05em;
        box-shadow: 6px 6px 0 #ff3d7f;
        transform: rotate(-2deg);
      }
      .title {
        font-size: 200px;
        font-weight: 900;
        letter-spacing: 0.02em;
        margin-top: 30px;
        line-height: 1;
        color: #1a1a1a;
        text-shadow:
          6px 6px 0 #ffd400,
          12px 12px 0 #ff3d7f;
        transform: rotate(-3deg);
        display: inline-block;
      }
      .title-bang {
        color: #ff3d7f;
        text-shadow:
          6px 6px 0 #1a1a1a,
          12px 12px 0 #ffd400;
      }
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: relative;
        z-index: 1;
      }
      .features {
        display: flex;
        gap: 14px;
      }
      .feature {
        background: #fff;
        color: #1a1a1a;
        border: 3.5px solid #1a1a1a;
        padding: 14px 26px;
        border-radius: 14px;
        font-size: 26px;
        font-weight: 800;
        box-shadow: 4px 4px 0 #1a1a1a;
      }
      .feature.pink {
        background: #ff3d7f;
        color: #fff;
      }
      .feature.yellow {
        background: #ffd400;
      }
      .url {
        background: #1a1a1a;
        color: #fff;
        padding: 14px 28px;
        border-radius: 14px;
        font-size: 26px;
        font-weight: 800;
        font-family: ui-monospace, "SF Mono", monospace;
        box-shadow: 4px 4px 0 #ffd400;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="burst"></div>
      <div class="header">
        <div class="badge-bubble">🎤 ボケに即興でツッコめ！</div>
        <h1 class="title">ツッコメッ<span class="title-bang">！！</span></h1>
      </div>
      <div class="footer">
        <div class="features">
          <div class="feature pink">⌨ テキスト入力</div>
          <div class="feature yellow">🎤 音声入力</div>
          <div class="feature">🔊 自動読み上げ</div>
        </div>
        <div class="url">tsukkome.vercel.app</div>
      </div>
    </div>
  </body>
</html>
