<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 1200px;
        height: 630px;
        font-family: -apple-system, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
        background: linear-gradient(135deg, #1a1d2e 0%, #2a2d4e 50%, #4a3d6e 100%);
        color: #fff;
        overflow: hidden;
      }
      .container {
        width: 100%;
        height: 100%;
        padding: 80px 90px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
      }
      .glow1 {
        position: absolute;
        top: -100px;
        right: -100px;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(74, 92, 255, 0.4) 0%, transparent 70%);
        border-radius: 50%;
      }
      .glow2 {
        position: absolute;
        bottom: -150px;
        left: -100px;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(255, 74, 138, 0.25) 0%, transparent 70%);
        border-radius: 50%;
      }
      .header {
        position: relative;
        z-index: 1;
      }
      .badge {
        display: inline-block;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 8px 20px;
        border-radius: 999px;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.05em;
        backdrop-filter: blur(10px);
      }
      .title {
        font-size: 130px;
        font-weight: 900;
        letter-spacing: -0.02em;
        margin-top: 28px;
        line-height: 1;
        background: linear-gradient(135deg, #fff 0%, #c8d0ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .subtitle {
        font-size: 36px;
        font-weight: 500;
        margin-top: 24px;
        color: rgba(255, 255, 255, 0.85);
      }
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: relative;
        z-index: 1;
      }
      .features {
        display: flex;
        gap: 16px;
      }
      .feature {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        padding: 12px 24px;
        border-radius: 12px;
        font-size: 24px;
        font-weight: 500;
      }
      .url {
        font-size: 26px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.7);
        font-family: ui-monospace, "SF Mono", monospace;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="glow1"></div>
      <div class="glow2"></div>
      <div class="header">
        <div class="badge">🎤 漫才の感性をオンラインで磨こう</div>
        <h1 class="title">ツッコミ練習</h1>
        <p class="subtitle">ボケのお題に、即興でツッコめ！</p>
      </div>
      <div class="footer">
        <div class="features">
          <div class="feature">⌨ テキスト入力</div>
          <div class="feature">🎤 音声入力</div>
          <div class="feature">🔊 自動読み上げ</div>
        </div>
        <div class="url">tsukkome.vercel.app</div>
      </div>
    </div>
  </body>
</html>
